<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6ca"/>
      <stop offset="100%" style="stop-color:#e8d5b0"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    <linearGradient id="tie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#96281b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="250" r="240" fill="url(#bg)" stroke="#c4a87c" stroke-width="3"/>

  <!-- Body / Suit jacket -->
  <path d="M130 280 L140 460 L260 460 L270 280 Z" fill="url(#suit)" stroke="#1a252f" stroke-width="2"/>
  <!-- Lapels -->
  <path d="M200 280 L160 340 L200 360 L240 340 Z" fill="#34495e" stroke="#1a252f" stroke-width="1.5"/>
  <!-- White shirt triangle -->
  <path d="M200 285 L175 330 L200 345 L225 330 Z" fill="#ecf0f1"/>

  <!-- Tie -->
  <path d="M192 310 L200 330 L208 310 L208 380 L200 395 L192 380 Z" fill="url(#tie)" stroke="#7b241c" stroke-width="1"/>
  <!-- Tie knot -->
  <ellipse cx="200" cy="313" rx="12" ry="5" fill="#96281b"/>

  <!-- Tie slightly askew (offset) -->
  <g transform="rotate(3, 200, 350)">
    <path d="M192 310 L200 330 L208 310 L208 380 L200 395 L192 380 Z" fill="url(#tie)" stroke="#7b241c" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Pocket with pens -->
  <rect x="235" y="330" width="22" height="18" rx="2" fill="#1a252f" stroke="#2c3e50" stroke-width="1"/>
  <!-- Pens in pocket -->
  <rect x="238" y="318" width="3" height="14" rx="1" fill="#e74c3c"/>
  <rect x="243" y="320" width="3" height="12" rx="1" fill="#3498db"/>
  <rect x="248" y="316" width="3" height="16" rx="1" fill="#f1c40f"/>
  <!-- Pen clips -->
  <rect x="238" y="318" width="3" height="3" rx="0.5" fill="#bdc3c7"/>
  <rect x="243" y="320" width="3" height="3" rx="0.5" fill="#bdc3c7"/>
  <rect x="248" y="316" width="3" height="3" rx="0.5" fill="#bdc3c7"/>

  <!-- Arms -->
  <path d="M130 290 Q100 340 90 400" fill="none" stroke="#2c3e50" stroke-width="14" stroke-linecap="round"/>
  <path d="M270 290 Q300 340 310 400" fill="none" stroke="#2c3e50" stroke-width="14" stroke-linecap="round"/>

  <!-- Hands -->
  <circle cx="90" cy="400" r="12" fill="#e8b88a"/>
  <circle cx="310" cy="400" r="12" fill="#e8b88a"/>

  <!-- Giant calculator in left hand -->
  <g transform="translate(55, 355) rotate(-10)">
    <rect x="0" y="0" width="80" height="110" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
    <rect x="5" y="5" width="70" height="20" rx="3" fill="#1a252f"/>
    <text x="40" y="20" font-family="monospace" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">888888</text>
    <!-- Calculator buttons -->
    <g font-family="monospace" font-size="10" fill="#ecf0f1" text-anchor="middle">
      <rect x="6" y="30" width="14" height="10" rx="1" fill="#34495e"/><text x="13" y="38">7</text>
      <rect x="23" y="30" width="14" height="10" rx="1" fill="#34495e"/><text x="30" y="38">8</text>
      <rect x="40" y="30" width="14" height="10" rx="1" fill="#34495e"/><text x="47" y="38">9</text>
      <rect x="57" y="30" width="18" height="10" rx="1" fill="#c0392b"/><text x="66" y="38">/</text>
      <rect x="6" y="44" width="14" height="10" rx="1" fill="#34495e"/><text x="13" y="52">4</text>
      <rect x="23" y="44" width="14" height="10" rx="1" fill="#34495e"/><text x="30" y="52">5</text>
      <rect x="40" y="44" width="14" height="10" rx="1" fill="#34495e"/><text x="47" y="52">6</text>
      <rect x="57" y="44" width="18" height="10" rx="1" fill="#c0392b"/><text x="66" y="52">x</text>
      <rect x="6" y="58" width="14" height="10" rx="1" fill="#34495e"/><text x="13" y="66">1</text>
      <rect x="23" y="58" width="14" height="10" rx="1" fill="#34495e"/><text x="30" y="66">2</text>
      <rect x="40" y="58" width="14" height="10" rx="1" fill="#34495e"/><text x="47" y="66">3</text>
      <rect x="57" y="58" width="18" height="10" rx="1" fill="#c0392b"/><text x="66" y="66">-</text>
      <rect x="6" y="72" width="14" height="10" rx="1" fill="#27ae60"/><text x="13" y="80">0</text>
      <rect x="23" y="72" width="14" height="10" rx="1" fill="#34495e"/><text x="30" y="80">.</text>
      <rect x="40" y="72" width="14" height="10" rx="1" fill="#34495e"/><text x="47" y="80">%</text>
      <rect x="57" y="72" width="18" height="22" rx="1" fill="#27ae60"/><text x="66" y="85">=</text>
    </g>
  </g>

  <!-- Neck -->
  <rect x="185" y="225" width="30" height="55" rx="5" fill="#e8b88a"/>

  <!-- Head -->
  <ellipse cx="200" cy="195" rx="65" ry="70" fill="#e8b88a"/>

  <!-- Messy hair -->
  <g fill="#4a3728">
    <ellipse cx="200" cy="130" rx="68" ry="45"/>
    <ellipse cx="160" cy="140" rx="30" ry="40"/>
    <ellipse cx="240" cy="140" rx="30" ry="40"/>
    <ellipse cx="180" cy="125" rx="25" ry="35"/>
    <ellipse cx="220" cy="125" rx="25" ry="35"/>
    <!-- Stray hairs -->
    <path d="M150 135 Q140 110 135 100" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M155 130 Q145 105 140 90" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M245 130 Q255 105 260 95" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M250 135 Q260 110 265 100" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Cowlick -->
    <path d="M200 125 Q205 105 210 95 Q215 100 210 110" stroke="#4a3728" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Eyebrows -->
  <path d="M165 170 Q180 165 190 168" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M210 168 Q220 165 235 170" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Round glasses -->
  <circle cx="177" cy="185" r="20" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="223" cy="185" r="20" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Bridge -->
  <path d="M197 185 Q200 180 203 185" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- Arms -->
  <line x1="157" y1="183" x2="140" y2="178" stroke="#2c3e50" stroke-width="2.5"/>
  <line x1="243" y1="183" x2="260" y2="178" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- Glasses shine -->
  <path d="M167 177 Q172 173 176 177" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M213 177 Q218 173 222 177" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

  <!-- Eyes -->
  <ellipse cx="177" cy="185" rx="5" ry="6" fill="#2c3e50"/>
  <ellipse cx="223" cy="185" rx="5" ry="6" fill="#2c3e50"/>
  <ellipse cx="179" cy="183" rx="2" ry="2" fill="white"/>
  <ellipse cx="225" cy="183" rx="2" ry="2" fill="white"/>

  <!-- Nose -->
  <path d="M200 190 Q205 205 200 210" fill="none" stroke="#c08a6e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Slight smile -->
  <path d="M185 220 Q200 228 215 220" fill="none" stroke="#8b5e3c" stroke-width="2" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="135" cy="190" rx="8" ry="14" fill="#e0a87a"/>
  <ellipse cx="265" cy="190" rx="8" ry="14" fill="#e0a87a"/>

  <!-- Mustache/beard stubble dots -->
  <g fill="#c08a6e">
    <circle cx="190" cy="225" r="1"/>
    <circle cx="195" cy="227" r="1"/>
    <circle cx="200" cy="226" r="1"/>
    <circle cx="205" cy="227" r="1"/>
    <circle cx="210" cy="225" r="1"/>
  </g>

  <!-- Folders/ledger stack under right arm -->
  <g transform="translate(280, 320) rotate(5)">
    <rect x="0" y="0" width="50" height="65" rx="3" fill="#8b4513" stroke="#5d2e0d" stroke-width="1.5"/>
    <rect x="3" y="3" width="44" height="59" rx="2" fill="#a0522d"/>
    <line x1="10" y1="20" x2="40" y2="20" stroke="#8b4513" stroke-width="1.5"/>
    <line x1="10" y1="30" x2="40" y2="30" stroke="#8b4513" stroke-width="1.5"/>
    <line x1="10" y1="40" x2="35" y2="40" stroke="#8b4513" stroke-width="1.5"/>
    <line x1="10" y1="50" x2="38" y2="50" stroke="#8b4513" stroke-width="1.5"/>
  </g>

  <!-- Small thought/question mark -->
  <g transform="translate(300, 140)">
    <text font-family="sans-serif" font-size="28" font-weight="bold" fill="#7f8c8d">?</text>
  </g>

  <!-- Checkmark overlay -->
  <g transform="translate(260, 160)">
    <path d="M0 10 L8 18 L20 0" fill="none" stroke="#27ae60" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small checkmark count -->
  <g transform="translate(278, 162)">
    <text font-family="sans-serif" font-size="10" fill="#27ae60" font-weight="bold">x50</text>
  </g>

</svg>
